<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group03 — Network Login</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #ffffff;
    }

    /* ── Page shell ── */
    .page {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Two-column main area ── */
    .main {
      display: flex;
      flex: 1;
      align-items: stretch;
    }

    /* ════════════════════════════
       LEFT PANEL  (~70 %)
    ════════════════════════════ */
    .left {
      flex: 0 0 70%;
      position: relative;
      overflow: hidden;
      min-height: 100vh;
    }

    /* Background image */
    .left::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('BG_image.jpg');
      background-size: cover;
      background-position: 2% center;
      z-index: 0;
    }

    /* White gradient — only at bottom edge */
    .left::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1%;
      background: linear-gradient(to bottom, transparent, #ffffff);
      z-index: 1;
    }

    /* Red italic security text — vertically centered */
    .security-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 2;
      width: 90%;
    }

    .security-text p {
      color: #df2c14;
      font-size: clamp(20px, 2.5vw, 36px);
      font-weight: bold;
      line-height: 1.4;
      font-family: Arial, sans-serif;
      text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff, 0px 0px 8px rgba(255, 255, 255, 0.8);
    }

    /* Contact info — sits over the wave section */
    .contact-info {
      position: absolute;
      bottom: 25px;
      left: 20px;
      z-index: 3;
      font-size: 14px;
      font-weight: bold;
      color: #000;
      line-height: 1.4;
      font-family: Arial, sans-serif;
    }

    /* Wave SVG block at very bottom of left panel */
    .wave-wrap {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 2;
      line-height: 0;
    }

    /* ════════════════════════════
       RIGHT PANEL  (~30 %)
    ════════════════════════════ */
    .right {
      flex: 0 0 30%;
      background: #ffffff;
      padding: 140px 40px 40px 40px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      border-left: 1px solid #e0e0e0;
    }

    /* Logo image */
    .logo-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }

    .logo-wrap img {
      max-width: 300px;
      width: 100%;
      height: auto;
      display: block;
    }

    /* Form description */
    .form-desc {
      font-size: 14px;
      font-weight: normal;
      font-family: Arial, sans-serif;
      color: #000;
      line-height: 1.3;
      margin-bottom: 12px;
    }

    /* Input row */
    .input-row {
      display: flex;
      width: 100%;
      margin-bottom: 6px;
      border: 1px solid #ccc;
      border-radius: 2px;
      overflow: hidden;
      background: #fff;
    }

    .input-row input {
      flex: 1;
      padding: 6px 8px;
      border: none;
      outline: none;
      font-size: 11px;
      font-family: Arial, sans-serif;
      color: #000;
      background: transparent;
    }

    .input-row input::placeholder {
      color: #888;
      font-size: 11px;
    }

    /* Remember me row */
    .remember-row {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      font-weight: normal;
      color: #000;
      margin: 4px 0 20px 0;
      cursor: pointer;
    }

    .remember-row input[type="checkbox"] {
      width: 11px;
      height: 11px;
      cursor: pointer;
      margin: 0;
    }

    .remember-row label {
      cursor: pointer;
    }

    /* Sign in button */
    .btn-signin {
      background: #3b82f6;
      color: #fff;
      border: none;
      padding: 6px 20px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      font-weight: normal;
      cursor: pointer;
      border-radius: 2px;
    }

    .btn-signin:hover {
      background: #2563eb;
    }

    /* ════════════════════════════
       FOOTER LINKS
    ════════════════════════════ */
    .footer {
      padding: 10px 30px;
      text-align: right;
      font-size: 9px;
      background: #fff;
      border-top: none;
      font-family: Arial, sans-serif;
    }

    .footer a {
      color: #000;
      text-decoration: none;
      margin-left: 10px;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* Error message */
    .error-msg {
      display: none;
      color: #ff0000;
      font-size: 16px;
      font-family: Arial, sans-serif;
      font-weight: normal;
      margin-top: 5px;
      margin-bottom: 6px;
    }

    /* ════════════════════════════
       RESPONSIVE DESIGN (Mobile)
    ════════════════════════════ */
    @media (max-width: 768px) {
      .main {
        flex-direction: column;
      }

      .left {
        flex: 0 0 30vh;
        min-height: 30vh;
      }

      .right {
        flex: 1;
        padding: 40px 20px;
        border-left: none;
        border-top: 1px solid #e0e0e0;
      }

      .security-text p {
        font-size: clamp(16px, 4vw, 24px);
      }

      .logo-wrap {
        margin-bottom: 20px;
      }

      .logo-wrap img {
        max-width: 200px;
      }
    }
  </style>
</head>

<body>
  <div class="page">

    <!-- ═══════════ MAIN (left + right) ═══════════ -->
    <div class="main">

      <!-- LEFT PANEL -->
      <div class="left">

        <!-- Blue flowing wave at bottom -->
        <div class="wave-wrap">
          <svg viewBox="0 0 1000 190" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"
            style="display:block;width:100%;height:170px;">

            <!-- Filled wave shapes (back to front) -->
            <path d="M0,155 C180,85 380,175 580,115 C740,65 900,155 1000,110 L1000,190 L0,190 Z"
              fill="rgba(160,210,240,0.50)" />
            <path d="M0,135 C150,65 360,155 560,95 C720,45 880,135 1000,90 L1000,190 L0,190 Z"
              fill="rgba(100,170,225,0.48)" />
            <path d="M0,165 C230,105 440,185 650,135 C800,100 920,165 1000,145 L1000,190 L0,190 Z"
              fill="rgba(140,195,232,0.40)" />

            <!-- Dark stroke wave lines -->
            <path d="M0,95 C160,35 360,125 560,65 C710,15 860,105 1000,60" fill="none" stroke="rgba(40,110,195,0.70)"
              stroke-width="2.8" stroke-linecap="round" />
            <path d="M0,112 C200,52 400,140 600,82 C760,35 910,125 1000,82" fill="none" stroke="rgba(70,140,210,0.55)"
              stroke-width="2.2" stroke-linecap="round" />
            <path d="M0,128 C180,72 390,155 590,100 C750,58 910,142 1000,105" fill="none"
              stroke="rgba(110,170,225,0.45)" stroke-width="1.8" stroke-linecap="round" />
            <path d="M0,142 C210,88 420,165 620,115 C780,75 930,155 1000,125" fill="none"
              stroke="rgba(150,200,235,0.38)" stroke-width="1.4" stroke-linecap="round" />
          </svg>
        </div>

      </div><!-- /left -->

      <!-- RIGHT PANEL -->
      <div class="right">

        <!-- Logo image -->
        <div class="logo-wrap">
          <img src="psu_login_logo.jpg" alt="Group03 Network Logo" />
        </div>

        <!-- Form description -->
        <p class="form-desc">
          Please input your passport account name and your<br>
          password / กรุณากรอกบัญชี PSU Passport และรหัสผ่าน
        </p>

        <!-- Login form -->
        <form id="loginForm" method="post" autocomplete="off" style="width:100%">

          <!-- Hidden fields required by Cisco WLC -->
          <input type="hidden" name="buttonClicked" size="16" maxlength="15" value="4">
          <input type="hidden" name="err_flag" size="16" maxlength="15" value="0">
          <input type="hidden" name="err_msg" size="512" maxlength="511" value="">
          <input type="hidden" name="info_flag" size="16" maxlength="15" value="0">
          <input type="hidden" name="info_msg" size="512" maxlength="511" value="">
          <input type="hidden" name="redirect_url" size="255" maxlength="255" value="">
          <!-- Note: WLC also often expects network_info, but the above are the core ones -->

          <!-- Username -->
          <div class="input-row">
            <input type="text" name="username" placeholder="PSU Passport Account Name" spellcheck="false" />
          </div>

          <!-- Password -->
          <div class="input-row">
            <input type="password" name="password" placeholder="Password" />
          </div>

          <!-- Remember me -->
          <div class="remember-row">
            <input type="checkbox" id="remember" name="remember" />
            <label for="remember">Remember me / จดจำการล็อคอิน</label>
          </div>

          <!-- Error Message (shown by Cisco WLC err_flag or local validation) -->
          <div class="error-msg" id="loginError">
            User or password not invalid/บัญชีหรือรหัสผ่านไม่ถูกต้อง
          </div>

          <!-- Submit -->
          <button type="button" class="btn-signin" onclick="submitAction()">Sign in</button>

        </form>

        <script>
          // Cisco WLC typically passes redirect parameters in the URL
          // Example: ?switch_url=https://1.1.1.1/login.html&ap_mac=...&client_mac=...&wlan=...&redirect=...

          // On page load: check if Cisco WLC returned err_flag=1 (auth failed)
          window.addEventListener('DOMContentLoaded', function () {
            const urlParams = new URLSearchParams(window.location.search);
            const errFlag = urlParams.get('err_flag');
            const statusCode = urlParams.get('statusCode'); // Some Cisco versions use statusCode=1 for invalid credentials

            if (errFlag === '1' || statusCode === '1') {
              document.getElementById('loginError').style.display = 'block';
            }
          });

          function submitAction() {
            const urlParams = new URLSearchParams(window.location.search);
            const switchUrl = urlParams.get('switch_url');
            const redirectUrl = urlParams.get('redirect');

            const form = document.getElementById('loginForm');
            const username = form.elements['username'].value.trim();
            const password = form.elements['password'].value;
            const errorDiv = document.getElementById('loginError');

            // Local validation: show error if fields are empty
            if (!username || !password) {
              errorDiv.style.display = 'block';
              return;
            }

            // Clear error if fields are valid
            errorDiv.style.display = 'none';

            // Set the redirect_url hidden field if provided by WLC
            if (redirectUrl) {
              form.elements['redirect_url'].value = redirectUrl;
            } else {
              // Fallback testing flow for local dev (bypasses Cisco flow)
              form.elements['redirect_url'].value = 'success.html?username=' + encodeURIComponent(username);
            }

            if (switchUrl) {
              // Production Cisco WLC flow — POST to the WLC virtual IP
              form.action = switchUrl;
              form.submit();
            } else {
              // Local testing flow: simulate successful login
              window.location.href = form.elements['redirect_url'].value;
            }
          }
        </script>

      </div><!-- /right -->

    </div><!-- /main -->

    <!-- FOOTER -->
    <div class="footer">
      <a href="#">&gt;About Passport&lt;</a>
      <a href="#">&gt;Forget Pass&lt;</a>
      <a href="#">&gt;Change Pass&lt;</a>
    </div>

  </div><!-- /page -->
</body>

</html>
